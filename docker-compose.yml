version: '3.8'

services:
  backend:
    build: ./backend
    container_name: aibaoni-backend
    restart: always
    environment:
      - FLASK_DEBUG=false
    volumes:
      - db-data:/app/instance  # SQLite 数据持久化
    networks:
      - aibaoni-net

  frontend:
    build: ./frontend
    container_name: aibaoni-frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./deploy/docker-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - aibaoni-net

volumes:
  db-data:

networks:
  aibaoni-net:
    driver: bridge
